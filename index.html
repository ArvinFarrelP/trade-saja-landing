<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maid Gallery — ArvinLabs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Poppins:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --white: #ffffff;
      --soft-gray: #f5f5f5;
      --text-muted: #b0b0b0;
      --text-dark: #1a1a1a;
      --accent: #2a2a2a;
      --border: rgba(0, 0, 0, 0.06);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--white);
      color: var(--text-dark);
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2.2rem 4rem;
      border-bottom: 1px solid var(--border);
      animation: fadeDown 0.8s ease both;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.45rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dark);
      text-decoration: none;
    }

    .logo span {
      color: var(--text-muted);
    }

    nav {
      display: flex;
      gap: 2.4rem;
    }

    nav a {
      text-decoration: none;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      transition: color 0.25s ease;
    }

    nav a:hover {
      color: var(--text-dark);
    }

    /* ── Hero ── */
    .hero {
      padding: 5rem 4rem 2rem;
      text-align: center;
      animation: fadeUp 0.9s ease 0.15s both;
    }

    .hero-tag {
      display: inline-block;
      font-size: 0.65rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 0.4rem 1.1rem;
      border-radius: 100px;
      margin-bottom: 1.6rem;
    }

    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 300;
      line-height: 1.1;
      letter-spacing: -0.01em;
      color: var(--text-dark);
      margin-bottom: 1rem;
    }

    .hero p {
      font-size: 0.82rem;
      line-height: 1.8;
      color: var(--text-muted);
      max-width: 380px;
      margin: 0 auto;
      letter-spacing: 0.03em;
    }

    /* ── Divider ── */
    .divider {
      width: 40px;
      height: 1px;
      background: var(--border);
      margin: 2.4rem auto;
    }

    /* ── Gallery ── */
    .gallery-section {
      padding: 1rem 3rem 4rem;
      flex: 1;
      animation: fadeUp 1s ease 0.3s both;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.6rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .card {
      position: relative;
      background: var(--soft-gray);
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .card:hover {
      transform: scale(1.025) translateY(-4px);
    }

    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0);
      transition: background 0.35s ease;
      pointer-events: none;
    }

    .card:hover::after {
      background: rgba(255, 255, 255, 0.06);
    }

    .card-img-wrap {
      width: 100%;
      aspect-ratio: 1200 / 847;
      overflow: hidden;
    }

    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .card:hover .card-img-wrap img {
      transform: scale(1.04);
    }

    .card-label {
      padding: 1rem 1.1rem 0.9rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--text-dark);
    }

    .card-number {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: var(--text-muted);
    }

    /* ── Character name labels ── */
    .char-1 .card-name::before { content: ''; }

    /* ── Stats row ── */
    .stats-row {
      display: flex;
      justify-content: center;
      gap: 5rem;
      padding: 3rem 4rem;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      animation: fadeUp 1s ease 0.45s both;
    }

    .stat {
      text-align: center;
    }

    .stat-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.4rem;
      font-weight: 300;
      color: var(--text-dark);
      line-height: 1;
      margin-bottom: 0.4rem;
    }

    .stat-label {
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ── Footer ── */
    footer {
      padding: 2rem 4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeUp 1s ease 0.55s both;
    }

    .footer-copy {
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Stagger card animations */
    .card:nth-child(1) { animation: fadeUp 0.7s ease 0.4s both; }
    .card:nth-child(2) { animation: fadeUp 0.7s ease 0.52s both; }
    .card:nth-child(3) { animation: fadeUp 0.7s ease 0.64s both; }
    .card:nth-child(4) { animation: fadeUp 0.7s ease 0.76s both; }

    /* ── Responsive ── */
    @media (max-width: 1024px) {
      header {
        padding: 1.8rem 2.4rem;
      }
      .hero {
        padding: 4rem 2.4rem 1.5rem;
      }
      .gallery-section {
        padding: 1rem 2rem 3rem;
      }
      .gallery-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 1.2rem;
      }
      .stats-row {
        gap: 3rem;
        padding: 2.5rem 2.4rem;
      }
    }

    @media (max-width: 640px) {
      header {
        padding: 1.4rem 1.6rem;
        flex-direction: column;
        gap: 1rem;
      }
      nav {
        gap: 1.6rem;
      }
      .hero {
        padding: 3rem 1.6rem 1.2rem;
      }
      .gallery-section {
        padding: 0.8rem 1.4rem 2.4rem;
      }
      .gallery-grid {
        grid-template-columns: 1fr;
        gap: 1rem;
      }
      .stats-row {
        gap: 2rem;
        padding: 2rem 1.6rem;
        flex-wrap: wrap;
      }
      footer {
        padding: 1.6rem;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <a class="logo" href="#">Arvin<span>Labs</span></a>
    <nav>
      <a href="#">Gallery</a>
      <a href="#">Characters</a>
      <a href="#">About</a>
    </nav>
  </header>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-tag">Original Character Collection</div>
    <h1>The Maid<br>Ensemble</h1>
    <p>A curated collection of anime-style maid characters, each with a distinct personality and grace.</p>
    <div class="divider"></div>
  </section>

  <!-- Gallery -->
  <section class="gallery-section" aria-label="Character Gallery">
    <div class="gallery-grid">

      <article class="card char-1">
        <div class="card-img-wrap">
          <img
            src="1.png"
            alt="Maid character — Alice/Elisa"
            style="object-position: 8% top;"
          />
        </div>
        <div class="card-label">
          <span class="card-name">Alice/Elisa</span>
          <span class="card-number">No. 01</span>
        </div>
      </article>

      <article class="card char-2">
        <div class="card-img-wrap">
          <img
            src="2.png"
            alt="Maid character — Lola"
            style="object-position: 36% top;"
          />
        </div>
        <div class="card-label">
          <span class="card-name">Lola</span>
          <span class="card-number">No. 02</span>
        </div>
      </article>

      <article class="card char-3">
        <div class="card-img-wrap">
          <img
            src="3.png"
            alt="Maid character — Lily"
            style="object-position: 64% top;"
          />
        </div>
        <div class="card-label">
          <span class="card-name">Lily</span>
          <span class="card-number">No. 03</span>
        </div>
      </article>

      <article class="card char-4">
        <div class="card-img-wrap">
          <img
            src="4.png"
            alt="Maid character — Chloe"
            style="object-position: 92% top;"
          />
        </div>
        <div class="card-label">
          <span class="card-name">Chloe</span>
          <span class="card-number">No. 04</span>
        </div>
      </article>

    </div>
  </section>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat">
      <div class="stat-number">4</div>
      <div class="stat-label">Characters</div>
    </div>
    <div class="stat">
      <div class="stat-number">1</div>
      <div class="stat-label">Collection</div>
    </div>
    <div class="stat">
      <div class="stat-number">∞</div>
      <div class="stat-label">Stories</div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <p class="footer-copy">© ArvinLabs 2026</p>
  </footer>

</body>
</html>
